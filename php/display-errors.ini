; #ddev-generated
; Don't show PHP errors on the page — log them instead
display_errors = Off
log_errors = On

; Auto-load .ddev/wp-config-local.php on every PHP request.
; This is how local-only WP constants survive DDEV regenerating wp-config.php on restart.
auto_prepend_file = /var/www/html/.ddev/wp-config-local.php
